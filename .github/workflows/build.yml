name: Build and Release

on:
  push:
    tags:
      - 'v*'

permissions:
  contents: write

jobs:
  build:
    runs-on: windows-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup .NET
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: '6.0.x'

      - name: Publish (single-file, self-contained, win-x64)
        run: dotnet publish WindowTinter.csproj -c Release -r win-x64 -p:PublishSingleFile=true -p:SelfContained=true -o publish

      - name: Zip
        run: Compress-Archive -Path publish\* -DestinationPath WindowTinter.zip

      - name: Release
        uses: softprops/action-gh-release@v2
        with:
          files: WindowTinter.zip
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
